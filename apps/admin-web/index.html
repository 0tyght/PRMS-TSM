<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta name="theme-color" content="#0b6847" />

    <title>PRMS-TSM | เทศบาลท่าโพธ์</title>

    <style>
      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #f3f7f5;
      }

      .app-bootstrap,
      .fatal-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        box-sizing: border-box;
        background: #f3f7f5;
        color: #49625a;
        font: 14px system-ui, sans-serif;
      }

      .app-bootstrap span,
      .fatal-shell section {
        padding: 18px 22px;
        border: 1px solid #dfe9e4;
        border-radius: 12px;
        background: #ffffff;
        text-align: center;
        box-shadow: 0 12px 40px rgba(23, 55, 44, 0.1);
      }

      .fatal-shell {
        position: fixed;
        inset: 0;
        z-index: 9999;
      }

      .fatal-shell[hidden] {
        display: none !important;
      }

      .fatal-shell h1 {
        margin: 0;
        color: #18332b;
        font-size: 20px;
      }

      .fatal-shell p {
        max-width: 440px;
        margin: 9px 0 0;
        color: #6d817a;
        font-size: 13px;
        line-height: 1.6;
      }

      .fatal-shell button {
        margin-top: 16px;
        padding: 10px 15px;
        border: 0;
        border-radius: 9px;
        background: #0b6847;
        color: #ffffff;
        font: 700 12px system-ui, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="app-bootstrap">
        <span>กำลังเปิดระบบ PRMS-TSM…</span>
      </div>
    </div>

    <div
      id="fatal-root"
      class="fatal-shell"
      role="alert"
      hidden
    >
      <section>
        <h1>ไม่สามารถเปิดระบบได้</h1>

        <p>
          ไฟล์เว็บไซต์หรือระบบแสดงผลเกิดข้อผิดพลาด
          กรุณาโหลดเว็บไซต์ใหม่
        </p>

        <button
          type="button"
          onclick="window.location.reload()"
        >
          โหลดเว็บไซต์ใหม่
        </button>
      </section>
    </div>

    <noscript>
      กรุณาเปิดใช้งาน JavaScript เพื่อใช้งานระบบ PRMS-TSM
    </noscript>

    <script>
      window.__prmsBootTimer = window.setTimeout(function () {
        var root = document.getElementById("root");
        var fatal = document.getElementById("fatal-root");

        if (
          root &&
          fatal &&
          root.querySelector(".app-bootstrap")
        ) {
          fatal.hidden = false;
        }
      }, 12000);
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
